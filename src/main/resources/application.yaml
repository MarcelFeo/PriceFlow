spring:
  application:
    name: priceflow

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    addresses: ${RABBIT_URL}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASS}

  server:
    port: ${PORT:8080}